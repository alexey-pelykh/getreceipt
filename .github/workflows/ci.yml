name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the matrix only needs to read the repository.
permissions:
  contents: read

# Cancel superseded in-progress runs for the same PR; never cancel a push-to-main run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      # Report every leg independently — a Windows failure must not mask a passing macOS leg.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Node 24 (Active LTS) + 26 (Current), per issue #20. Both satisfy engines `>=22.11.0`.
        node: ['24', '26']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm must be installed before setup-node so its store can be cached.
      # The pnpm version is read from the root package.json `packageManager` field.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
