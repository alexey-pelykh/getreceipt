name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the matrix only needs to read the repository.
permissions:
  contents: read

# Cancel superseded in-progress runs for the same PR; never cancel a push-to-main run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      # Report every leg independently — a Windows failure must not mask a passing macOS leg.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Node 24 (Active LTS) + 26 (Current), per issue #20. Both satisfy engines `>=24`.
        node: ['24', '26']
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # pnpm must be installed before setup-node so its store can be cached.
      # The pnpm version is read from the root package.json `packageManager` field.
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @getreceipt/browser renders via headless Chromium (Playwright), so its test needs the browser
      # binary — absent from CI runners by default. Cache the (large) download keyed by OS + lockfile
      # (which pins the Playwright version), then run `playwright install` every time regardless of the
      # cache: on a hit it finds the binary and skips the download; on Linux `--with-deps` still installs
      # the apt system libraries Chromium needs (those live in system dirs the cache does not cover).
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~/AppData/Local/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium (with system deps on Linux)
        if: runner.os == 'Linux'
        run: pnpm --filter @getreceipt/browser exec playwright install --with-deps chromium

      - name: Install Playwright Chromium
        if: runner.os != 'Linux'
        run: pnpm --filter @getreceipt/browser exec playwright install chromium

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # Formatting is platform- and Node-invariant, so Prettier runs once in its own
  # job rather than on every build-test matrix leg (issue #38).
  format:
    name: Format (Prettier)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check
