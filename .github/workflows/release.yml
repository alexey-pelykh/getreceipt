name: Release

# A published GitHub Release (tag vX.Y.Z[-pre]) triggers the publish train; drafts excluded.
on:
  release:
    types: [published]

# Least privilege by default; only the publish job elevates id-token (for OIDC).
permissions:
  contents: read

# One publish per tag; never cancel in-flight — a half-published release is the worst outcome.
concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  # GATE 1: derive version + dist-tag from the tag (pre-release → @next/AC1, plain → @latest/AC2)
  # and assert it agrees with the Release pre-release flag (AC3). Fails before any npm mutation.
  guard:
    name: Derive version & guard agreement
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.derive.outputs.version }}
      dist_tag: ${{ steps.derive.outputs.dist_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      # No `registry-url`: it makes setup-node write _authToken into .npmrc, which breaks OIDC.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release tooling
        run: pnpm --filter @getreceipt/release build

      - name: Derive version + dist-tag and guard against the release pre-release flag
        id: derive
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: node packages/release/dist/bin/release-guard.js

  # GATE 2: build + typecheck + test must pass before any publish. Sibling of `guard`; publish needs both.
  validate:
    name: Build, typecheck & test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @getreceipt/browser's test renders via headless Chromium (Playwright); install the browser before
      # `pnpm test` exercises it. Cached by lockfile (which pins the Playwright version); `--with-deps`
      # adds the apt system libraries Chromium needs (this job is ubuntu-only).
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium (with system deps)
        run: pnpm --filter @getreceipt/browser exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # PUBLISH: stamp the version into every package.json, then idempotently (AC4) publish each public
  # package to its dist-tag via OIDC trusted publishing (AC6) with provenance (AC5). No NPM_TOKEN.
  publish:
    name: Stamp & publish to npm
    needs: [guard, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Publish environment (AC6) — create in Settings → Environments to gate this job. Runs
    # unprotected until configured, but never with a token (auth is OIDC).
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # OIDC token exchange + provenance attestation (AC6).
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      # node-version >= 22.14.0 is required for trusted publishing; no `registry-url` (see guard).
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm

      # npm >= 11.5.1 aligns the provenance toolchain; the publish itself runs through pnpm.
      # Floor-pinned (not @latest) for reproducible runs; quote the >= or the shell reads a redirect.
      - name: Upgrade npm for trusted-publishing toolchain
        run: npm install --global "npm@>=11.5.1"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build (on committed 0.0.0) before stamping: dist embeds no version, and install is frozen.
      - name: Build
        run: pnpm build

      - name: Stamp release version into every workspace package.json
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: node packages/release/dist/bin/release-stamp.js

      - name: Publish (idempotent, provenance, OIDC trusted publishing)
        env:
          VERSION: ${{ needs.guard.outputs.version }}
          DIST_TAG: ${{ needs.guard.outputs.dist_tag }}
        run: node packages/release/dist/bin/release-publish.js
