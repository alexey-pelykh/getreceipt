# Flat config exercised by the config-command tests (the file IS the "default" profile).
# Mixes an op:// reference (shown unresolved by `config show`) with an inline literal (masked).
sources:
  free.fr:
    auth:
      kind: password
      username: alice@free.fr
      secret:
        ref: op://Personal/free.fr/password
  amazon.fr:
    auth:
      kind: api-token
      secret: inline-token-value
