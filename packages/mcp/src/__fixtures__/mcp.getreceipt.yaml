# Flat config exercised by the MCP tool tests (the "default" profile). `shop.example` matches the
# tests' fake adapter (canonical domain); `ghost.example` is configured but has NO registered adapter
# (exercises the per-source unknown-source slot in collect_all and `registered: false` in auth_status).
# The inline secrets are obvious non-secrets (the #7 clean-tree scan ignores them) and the tests
# inject the credential resolver anyway — the redaction tests assert these never surface.
sources:
  shop.example:
    auth:
      kind: password
      username: alice@shop.example
      secret: hunter2-not-real
  ghost.example:
    auth:
      kind: api-token
      secret: token-not-real
