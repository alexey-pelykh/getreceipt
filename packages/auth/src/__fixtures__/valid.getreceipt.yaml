# Example getreceipt config — used by ConfigLoader integration tests.
# Flat per-file profile: top-level `sources:` (the file IS one profile).
sources:
  free.fr:
    auth:
      kind: password
      username: alice@free.fr
      secret:
        ref: FREE_PASSWORD
  amazon.fr:
    auth:
      kind: api-token
      secret: inline-token-value
