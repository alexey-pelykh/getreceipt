packages:
  - packages/*

# pnpm 11 blocks dependency build scripts by default. esbuild needs its postinstall
# (platform binary used by tsup + vitest); msw's is harmless. Both explicitly approved.
allowBuilds:
  esbuild: true
  msw: true

# Single source of truth for shared dependency versions (referenced as `catalog:`).
catalog:
  # Toolchain
  typescript: 6.0.3
  turbo: 2.10.2
  tsup: 8.5.1
  # Test substrate
  vitest: 4.1.9
  msw: 2.14.6
  # Lint + format
  eslint: 10.6.0
  '@eslint/js': 10.0.1
  typescript-eslint: 8.62.1
  eslint-config-prettier: 10.1.8
  prettier: 3.9.4
  # Types
  '@types/node': 26.1.0
  # Runtime
  commander: 15.0.0
  yaml: 2.9.0
  zod: 4.4.3
  '@modelcontextprotocol/sdk': 1.29.0
  # Chrome TLS/HTTP-2 browser impersonation (napi-rs Rust + BoringSSL) for Cloudflare-gated sources (#101).
  # napi prebuilt binaries via optionalDependencies — ABI-stable across Node 24/26, no from-source compile.
  node-wreq: 2.4.1
  # Headless-Chromium render engine for @getreceipt/browser (#172): HTML/URL -> PDF. The browser BINARY is
  # not pulled by install (pnpm blocks build scripts; see allowBuilds) — it is fetched explicitly via
  # `playwright install chromium` (CI wires this per leg), keeping installs hermetic and lightweight.
  playwright: 1.61.1

# Packages newer than pnpm's default minimum-release-age window; vetted + allowed so fresh clones (and the
# frozen-lockfile CI matrix) install deterministically without a prompt. node-wreq ships one prebuilt
# `@node-wreq/*` binary per platform as optionalDependencies — all are excluded so the lockfile is portable
# across the ubuntu/macos/windows matrix even though only the host's binary links locally.
minimumReleaseAgeExclude:
  - '@types/node@26.0.0'
  - 'yaml@2.9.0'
  - 'zod@4.4.3'
  - 'node-wreq@2.4.1'
  - 'playwright@1.61.1'
  - 'playwright-core@1.61.1'
  - '@node-wreq/darwin-arm64@2.4.1'
  - '@node-wreq/darwin-x64@2.4.1'
  - '@node-wreq/linux-arm64-gnu@2.4.1'
  - '@node-wreq/linux-x64-gnu@2.4.1'
  - '@node-wreq/linux-x64-musl@2.4.1'
  - '@node-wreq/win32-x64-msvc@2.4.1'
